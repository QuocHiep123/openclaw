services:
  bot:
    build: .
    container_name: ai-lab-bot
    restart: always
    env_file:
      - .env
    environment:
      APP_MODE: bot
    volumes:
      - bot-data:/app/data

  mcp:
    build: .
    container_name: ai-lab-mcp
    restart: always
    env_file:
      - .env
    environment:
      APP_MODE: server
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8100
    ports:
      - "8100:8100"
    volumes:
      - mcp-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  bot-data:
  mcp-data:
